syntax = "proto3";

package pandar.agent.v1;

service AgentControl {
  rpc ReverseConnect(stream AgentEvent) returns (stream HubCommand);
}

message AgentEvent {
  string agent_id = 1;
  string tenant_id = 2;
  string event_id = 3;
  oneof event {
    AgentHello hello = 10;
    AgentHeartbeat heartbeat = 11;
    PrinterSnapshot printer_snapshot = 12;
    CommandAck command_ack = 13;
    CommandResult command_result = 14;
    PrintJobReport print_job_report = 15;
  }
}

message AgentHello {
  string name = 1;
  string version = 2;
}

message AgentHeartbeat {
  string observed_at = 1;
}

message PrinterSnapshot {
  string serial = 1;
  string name = 2;
  string state = 3;
  string model = 4;
}

message CommandAck {
  string command_id = 1;
  bool accepted = 2;
  string error = 3;
}

message CommandResult {
  string command_id = 1;
  bool success = 2;
  string error = 3;
}

message PrintJobReport {
  string serial = 1;
  string job_id = 2;
  string artifact_id = 3;
  string subtask_id = 4;
  string gcode_file = 5;
  string subtask_name = 6;
  string gcode_state = 7;
  uint32 percent = 8;
  bool has_percent = 9;
  uint32 remaining_time_minutes = 10;
  bool has_remaining_time_minutes = 11;
  uint32 current_layer = 12;
  bool has_current_layer = 13;
  uint32 total_layers = 14;
  bool has_total_layers = 15;
  repeated MachineDiagnostic diagnostics = 16;
  string observed_at = 17;
}

message MachineDiagnostic {
  string kind = 1;
  string severity = 2;
  string code = 3;
  string message = 4;
  string payload_json = 5;
}

message HubCommand {
  string command_id = 1;
  oneof command {
    RefreshPrinters refresh_printers = 10;
    PrintProjectFile print_project_file = 11;
  }
}

message RefreshPrinters {}

message PrintProjectFile {
  string job_id = 1;
  string artifact_id = 2;
  string printer_id = 3;
  string serial_number = 4;
  string filename = 5;
  string storage_path = 6;
  uint64 size_bytes = 7;
  uint32 plate_id = 8;
  bool use_ams = 9;
  bool flow_cali = 10;
  bool timelapse = 11;
}
