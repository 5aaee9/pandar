services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pandar
      POSTGRES_USER: pandar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pandar-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandar -d pandar"]
      interval: 5s
      timeout: 5s
      retries: 12

  nats:
    image: nats:2-alpine
    profiles: ["nats"]
    command: ["-js", "-m", "8222"]
    expose:
      - "4222"
      - "8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  pandar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: pandar-api
    environment:
      PANDAR_DATABASE_URL: postgres://pandar:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/pandar
      PANDAR_HUB_BIND: 0.0.0.0:8080
      PANDAR_HUB_GRPC_BIND: 0.0.0.0:50051
      PANDAR_CONTROL_PLANE: ${PANDAR_CONTROL_PLANE:-in-process}
      PANDAR_NATS_URL: ${PANDAR_NATS_URL:-nats://nats:4222}
      PANDAR_ARTIFACT_STORAGE: ${PANDAR_ARTIFACT_STORAGE:-filesystem}
      PANDAR_SPOOL_DIR: ${PANDAR_SPOOL_DIR:-/spool}
      PANDAR_ARTIFACT_FILESYSTEM_SHARED: ${PANDAR_ARTIFACT_FILESYSTEM_SHARED:-false}
      PANDAR_ARTIFACT_S3_BUCKET: ${PANDAR_ARTIFACT_S3_BUCKET:-}
      PANDAR_ARTIFACT_S3_REGION: ${PANDAR_ARTIFACT_S3_REGION:-}
      PANDAR_ARTIFACT_S3_ENDPOINT: ${PANDAR_ARTIFACT_S3_ENDPOINT:-}
      PANDAR_ARTIFACT_S3_ACCESS_KEY_ID: ${PANDAR_ARTIFACT_S3_ACCESS_KEY_ID:-}
      PANDAR_ARTIFACT_S3_SECRET_ACCESS_KEY: ${PANDAR_ARTIFACT_S3_SECRET_ACCESS_KEY:-}
      PANDAR_ARTIFACT_S3_FORCE_PATH_STYLE: ${PANDAR_ARTIFACT_S3_FORCE_PATH_STYLE:-false}
      PANDAR_EXTERNAL_AUTH_PROVIDER: ${PANDAR_EXTERNAL_AUTH_PROVIDER:-}
      PANDAR_EXTERNAL_AUTH_ISSUER: ${PANDAR_EXTERNAL_AUTH_ISSUER:-}
      PANDAR_EXTERNAL_AUTH_JWKS_URL: ${PANDAR_EXTERNAL_AUTH_JWKS_URL:-}
      PANDAR_EXTERNAL_AUTH_AUDIENCE: ${PANDAR_EXTERNAL_AUTH_AUDIENCE:-}
      PANDAR_EXTERNAL_AUTH_ALGORITHMS: ${PANDAR_EXTERNAL_AUTH_ALGORITHMS:-}
      PANDAR_AUTH_ALLOW_TENANT_SELF_CREATE: ${PANDAR_AUTH_ALLOW_TENANT_SELF_CREATE:-true}
    # The default single-Hub filesystem backend persists /spool in pandar-spool.
    # For PostgreSQL+NATS replicas, prefer S3; a shared filesystem requires
    # PANDAR_ARTIFACT_FILESYSTEM_SHARED=true and a genuinely shared mount.
    volumes:
      - pandar-spool:/spool
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
        required: false

  pandar-web:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: pandar-web
    environment:
      APP_API_URL: http://pandar-api:8080
      APP_API_TOKEN: ${APP_API_TOKEN:-}
      APP_TENANT_ID: ${APP_TENANT_ID:-}
      APP_AUTH_PROVIDER: ${APP_AUTH_PROVIDER:-none}
      APP_AUTH_COOKIE_NAME: ${APP_AUTH_COOKIE_NAME:-pandar_auth_token}
      APP_AUTH_CLERK_PUBLISHABLE_KEY: ${APP_AUTH_CLERK_PUBLISHABLE_KEY:-}
      APP_AUTH_LOGTO_ENDPOINT: ${APP_AUTH_LOGTO_ENDPOINT:-}
      APP_AUTH_LOGTO_APP_ID: ${APP_AUTH_LOGTO_APP_ID:-}
      APP_AUTH_BETTER_AUTH_BASE_URL: ${APP_AUTH_BETTER_AUTH_BASE_URL:-}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - pandar-api

volumes:
  pandar-postgres:
  pandar-spool:
