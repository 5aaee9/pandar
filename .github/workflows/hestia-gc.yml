name: Hestia Cache GC

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: Plan only; do not repack, touch, or delete anything.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: hestia-gc
  cancel-in-progress: false

jobs:
  gc:
    name: Garbage collect hestia cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install hestia
        uses: Mic92/hestia@v1

      - name: Run garbage collection
        run: |
          "$HESTIA_BIN" gc ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
