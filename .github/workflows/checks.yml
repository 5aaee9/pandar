name: Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-chart:
    name: Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1

      - name: Lint chart
        run: helm lint docs/deployment/kubernetes

      - name: Render chart
        run: helm template pandar docs/deployment/kubernetes >/tmp/pandar-chart.yaml

  nix-quality-checks:
    name: Nix quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up hestia cache
        uses: Mic92/hestia/action@v1.0.1
        with:
          upstream-cache-filter: true

      - name: Run checks
        run: |
          nix build --show-trace \
            .#checks.x86_64-linux.pandar-fmt \
            .#checks.x86_64-linux.pandar-clippy \
            .#checks.x86_64-linux.pandar-nextest \
            .#checks.x86_64-linux.pandar-nixos-module \
            .#checks.x86_64-linux.pandar-nixos-options-doc

  nix-package-checks:
    name: Nix package checks (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up hestia cache
        uses: Mic92/hestia/action@v1.0.1
        with:
          upstream-cache-filter: true

      - name: Build packages
        run: |
          packages=(
            .#checks.${{ matrix.system }}.pandar-hub \
            .#checks.${{ matrix.system }}.pandar-agent \
            .#checks.${{ matrix.system }}.pandar-cli \
            .#checks.${{ matrix.system }}.pandar-web
          )
          if [ "${{ matrix.system }}" = "x86_64-linux" ]; then
            packages+=(.#checks.${{ matrix.system }}.pandar-network-plugin)
          fi
          nix build --show-trace "${packages[@]}"

  nixos-vm-tests:
    name: NixOS VM test (${{ matrix.backend }}, ${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
            system: x86_64-linux
            runner: ubuntu-latest
          - backend: postgres
            system: x86_64-linux
            runner: ubuntu-latest
          - backend: sqlite
            system: aarch64-linux
            runner: ubuntu-24.04-arm
          - backend: postgres
            system: aarch64-linux
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up hestia cache
        uses: Mic92/hestia/action@v1.0.1
        with:
          upstream-cache-filter: true

      - name: Run NixOS VM test
        run: nix build --show-trace .#checks.${{ matrix.system }}.pandar-nixos-test-${{ matrix.backend }}
