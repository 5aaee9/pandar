name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build and publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: hub
            context: .
            dockerfile: Dockerfile
          - name: web
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/5aaee9/pandar/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch,enable=${{ github.event_name == 'push' }}
            type=ref,event=tag
            type=raw,value=main,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Cleanup untagged image
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: pandar/${{ matrix.image.name }}
          delete-untagged: true

  helm-chart:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs:
      - docker
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve chart version
        id: chart-version
        shell: bash
        run: |
          set -euo pipefail
          chart_dir="docs/deployment/kubernetes"
          base_version="$(sed -n 's/^[[:space:]]*version:[[:space:]]*//p' "$chart_dir/Chart.yaml" | head -n1 | tr -d "\"'[:space:]")"
          if [ -z "$base_version" ]; then
            base_version="0.1.0"
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            chart_version="${GITHUB_REF_NAME#v}"
            app_version="${GITHUB_REF_NAME}"
            prerelease="false"
          else
            chart_version="${base_version}-main"
            app_version="main"
            prerelease="true"
          fi

          {
            echo "version=$chart_version"
            echo "app-version=$app_version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint docs/deployment/kubernetes

      - name: Render chart
        run: helm template pandar docs/deployment/kubernetes >/tmp/pandar-chart.yaml

      - name: Package chart
        run: |
          mkdir -p dist/chart
          helm package docs/deployment/kubernetes \
            --destination dist/chart \
            --version "${{ steps.chart-version.outputs.version }}" \
            --app-version "${{ steps.chart-version.outputs.app-version }}"

      - name: Remove replaceable main chart tag
        if: steps.chart-version.outputs.prerelease == 'true'
        continue-on-error: true
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: pandar/chart/pandar
          delete-tags: ${{ steps.chart-version.outputs.version }}

      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: helm push "dist/chart/pandar-${{ steps.chart-version.outputs.version }}.tgz" oci://ghcr.io/5aaee9/pandar/chart
