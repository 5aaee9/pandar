services:
  pandar-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: pandar-api
    environment:
      PANDAR_DATABASE_URL: sqlite:///data/pandar.db
      PANDAR_HUB_BIND: 0.0.0.0:8080
      PANDAR_HUB_GRPC_BIND: 0.0.0.0:50051
      PANDAR_ARTIFACT_STORAGE: filesystem
      PANDAR_SPOOL_DIR: /spool
      PANDAR_EXTERNAL_AUTH_PROVIDER: ${PANDAR_EXTERNAL_AUTH_PROVIDER:-}
      PANDAR_EXTERNAL_AUTH_ISSUER: ${PANDAR_EXTERNAL_AUTH_ISSUER:-}
      PANDAR_EXTERNAL_AUTH_JWKS_URL: ${PANDAR_EXTERNAL_AUTH_JWKS_URL:-}
      PANDAR_EXTERNAL_AUTH_AUDIENCE: ${PANDAR_EXTERNAL_AUTH_AUDIENCE:-}
      PANDAR_EXTERNAL_AUTH_ALGORITHMS: ${PANDAR_EXTERNAL_AUTH_ALGORITHMS:-}
      PANDAR_AUTH_ALLOW_TENANT_SELF_CREATE: ${PANDAR_AUTH_ALLOW_TENANT_SELF_CREATE:-true}
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - pandar-sqlite:/data
      - pandar-spool:/spool

  pandar-web:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: pandar-web
    environment:
      APP_API_URL: http://pandar-api:8080
      APP_API_TOKEN: ${APP_API_TOKEN:-}
      APP_TENANT_ID: ${APP_TENANT_ID:-}
      APP_AUTH_PROVIDER: ${APP_AUTH_PROVIDER:-none}
      APP_AUTH_COOKIE_NAME: ${APP_AUTH_COOKIE_NAME:-pandar_auth_token}
      APP_AUTH_CLERK_PUBLISHABLE_KEY: ${APP_AUTH_CLERK_PUBLISHABLE_KEY:-}
      APP_AUTH_LOGTO_ENDPOINT: ${APP_AUTH_LOGTO_ENDPOINT:-}
      APP_AUTH_LOGTO_APP_ID: ${APP_AUTH_LOGTO_APP_ID:-}
      APP_AUTH_BETTER_AUTH_BASE_URL: ${APP_AUTH_BETTER_AUTH_BASE_URL:-}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - pandar-api

volumes:
  pandar-sqlite:
  pandar-spool:
