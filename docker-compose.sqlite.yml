services:
  pandar-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: pandar-api
    environment:
      PANDAR_DATABASE_URL: sqlite:///data/pandar.db
      PANDAR_HUB_BIND: 0.0.0.0:8080
      PANDAR_HUB_GRPC_BIND: 0.0.0.0:50051
      PANDAR_SPOOL_DIR: /spool
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - pandar-sqlite:/data
      - pandar-spool:/spool

  pandar-web:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: pandar-web
    environment:
      APP_API_URL: http://pandar-api:8080
      APP_API_TOKEN: ${APP_API_TOKEN:?set APP_API_TOKEN to a tenant API token}
      APP_TENANT_ID: ${APP_TENANT_ID:-}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - pandar-api

volumes:
  pandar-sqlite:
  pandar-spool:
