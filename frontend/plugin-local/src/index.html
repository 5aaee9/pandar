<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pandar Target Server</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script type="module" src="./assets/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-labelledby="page-title">
        <h1 id="page-title">Target server</h1>
        <p class="summary">Choose the Pandar web and API endpoints used by this local plugin.</p>

        <div id="notice-list" class="notice-list" aria-live="polite"></div>

        <form id="target-form" class="form">
          <label for="web-url">Web URL</label>
          <input id="web-url" name="webUrl" type="url" autocomplete="url" required />

          <label for="hub-url">Hub URL</label>
          <input id="hub-url" name="hubUrl" type="url" autocomplete="url" required />

          <button type="submit">Switch Target server</button>
        </form>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <a id="continue-link" class="continue-link" href="#">Continue sign-in</a>
      </section>
    </main>
  </body>
</html>
