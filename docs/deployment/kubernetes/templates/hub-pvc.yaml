{{- if and .Values.hub.persistence.data.enabled (not .Values.hub.persistence.data.existingClaim) -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pandar.fullname" . }}-hub-data
  labels:
    {{- include "pandar.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  accessModes:
    {{- toYaml .Values.hub.persistence.data.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.hub.persistence.data.size | quote }}
  {{- if .Values.hub.persistence.data.storageClass }}
  storageClassName: {{ .Values.hub.persistence.data.storageClass | quote }}
  {{- end }}
---
{{- end }}
{{- if and .Values.hub.persistence.spool.enabled (not .Values.hub.persistence.spool.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pandar.fullname" . }}-hub-spool
  labels:
    {{- include "pandar.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  accessModes:
    {{- toYaml .Values.hub.persistence.spool.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.hub.persistence.spool.size | quote }}
  {{- if .Values.hub.persistence.spool.storageClass }}
  storageClassName: {{ .Values.hub.persistence.spool.storageClass | quote }}
  {{- end }}
{{- end }}
