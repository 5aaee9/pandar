apiVersion: v1
kind: Service
metadata:
  name: {{ include "pandar.fullname" . }}-hub
  labels:
    {{- include "pandar.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  type: {{ .Values.hub.service.type }}
  ports:
    - name: http
      port: {{ .Values.hub.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.hub.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "pandar.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: hub
