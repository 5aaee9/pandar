apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pandar.fullname" . }}-web
  labels:
    {{- include "pandar.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
data:
  APP_API_URL: {{ default (printf "http://%s-hub:%v" (include "pandar.fullname" .) .Values.hub.service.httpPort) .Values.web.appApiUrl | quote }}
  PORT: {{ .Values.web.service.port | quote }}
  {{- range $name, $value := .Values.web.env }}
  {{ $name }}: {{ $value | quote }}
  {{- end }}
