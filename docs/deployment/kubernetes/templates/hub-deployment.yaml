apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pandar.fullname" . }}-hub
  labels:
    {{- include "pandar.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  replicas: {{ .Values.hub.replicaCount }}
  selector:
    matchLabels:
      {{- include "pandar.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hub
  template:
    metadata:
      labels:
        {{- include "pandar.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hub
        {{- with .Values.hub.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.hub.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pandar.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hub.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hub
          image: "{{ .Values.hub.image.repository }}:{{ .Values.hub.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.hub.image.pullPolicy }}
          {{- with .Values.hub.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.hub.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.hub.service.grpcPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "pandar.fullname" . }}-hub
          env:
            - name: PANDAR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pandar.hubDatabaseSecretName" . }}
                  key: {{ .Values.hub.database.existingSecretKey }}
            {{- with .Values.hub.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.hub.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.hub.persistence.data.enabled .Values.hub.persistence.spool.enabled }}
          volumeMounts:
            {{- if .Values.hub.persistence.data.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.hub.persistence.spool.enabled }}
            - name: spool
              mountPath: /spool
            {{- end }}
          {{- end }}
      {{- if or .Values.hub.persistence.data.enabled .Values.hub.persistence.spool.enabled }}
      volumes:
        {{- if .Values.hub.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-hub-data" (include "pandar.fullname" .)) .Values.hub.persistence.data.existingClaim }}
        {{- end }}
        {{- if .Values.hub.persistence.spool.enabled }}
        - name: spool
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-hub-spool" (include "pandar.fullname" .)) .Values.hub.persistence.spool.existingClaim }}
        {{- end }}
      {{- end }}
      {{- with .Values.hub.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hub.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hub.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
