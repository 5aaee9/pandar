apiVersion: v1
kind: Service
metadata:
  name: {{ include "pandar.fullname" . }}-web
  labels:
    {{- include "pandar.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "pandar.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
